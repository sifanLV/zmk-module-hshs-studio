<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HSHS46 Layout Preview</title>
<style>
  body { background: #1a1a2e; margin: 20px; font-family: monospace; color: #eee; }
  h2 { color: #e94560; }
  svg { background: #16213e; border-radius: 8px; padding: 10px; display: block; }
  .key { stroke: #e94560; stroke-width: 1; fill: #0f3460; }
  .key-text { fill: #eee; font-family: monospace; font-size: 7px; text-anchor: middle; dominant-baseline: central; }
  .key-thumb { stroke: #00b4d8; stroke-width: 1.5; fill: #023e8a; }
  .key-esc { stroke: #f4a261; stroke-width: 1.5; fill: #6d3a1f; }
</style>
</head>
<body>
<h2>HSHS46 Physical Layout — ZMK Studio View</h2>
<p style="color:#aaa">Col <strong>3</strong> spine (W/S/X, O/L/DOT) ±15°, preview one strip. Col <strong>4</strong> E/D/C &amp; I/K/, <code>rot</code> 0 · own‑centre <code>rx/ry</code> (no shared pivot stagger). Col <strong>0</strong> ESC/SFT CAPS/SPC share thumb pivot <code>(735,431)</code> / <code>(1095,431)</code>. Mirrors <code>hshs46-layouts.dtsi</code>.</p>
<svg id="kb" xmlns="http://www.w3.org/2000/svg"></svg>

<script>
const SCALE = 0.38;
const W = 100, H = 100;

// [x, y, rot_centideg, rx, ry, label, cls] — matches DTSI; right cols 5–6 + left mirrored outer pair: rot 0 in DTSI, SVG group tilt
const keys = [
  [58,   176,     0, 108,  226, "`",    'key-pinky56-L'],
  [163,  176,     0, 213,  226, "Q",    'key-pinky56-L'],
  [219,   39, -1500, 269,   89, "W",    'key-col4-L'],
  [408,    0,     0, 458,   50, "E",    'key'],
  [508,   31,     0, 558,   81, "R",    'key'],
  [608,   44,     0, 658,   94, "T",    'key'],
  [1122,  44,     0, 1172,  94, "Y",    'key'],
  [1222,  31,     0, 1272,  81, "U",    'key'],
  [1322,   0,     0, 1372,  50, "I",    'key'],
  [1511,  39,  1500, 1561,  89, "O",    'key-col4-R'],
  [1567, 176,     0, 1617, 226, "P",    'key-pinky56'],
  [1672, 176,     0, 1722, 226, "BSPC", 'key-pinky56'],
  [58,   269,     0, 108,  319, "TAB",  'key-pinky56-L'],
  [163,  269,     0, 213,  319, "A",    'key-pinky56-L'],
  [253,  134, -1500, 303,  184, "S",    'key-col4-L'],
  [408,   94,     0, 458,  144, "D",    'key'],
  [508,  125,     0, 558,  175, "F",    'key'],
  [608,  139,     0, 658,  189, "G",    'key'],
  [1122, 139,     0, 1172, 189, "H",    'key'],
  [1222, 125,     0, 1272, 175, "J",    'key'],
  [1322,  94,     0, 1372, 144, "K",    'key'],
  [1477, 134,  1500, 1527, 184, "L",    'key-col4-R'],
  [1567, 269,     0, 1617, 319, "SEMI", 'key-pinky56'],
  [1672, 269,     0, 1722, 319, "ENTER",'key-pinky56'],
  [58,   362,     0, 108,  412, "CTL",  'key-pinky56-L'],
  [163,  362,     0, 213,  412, "Z",    'key-pinky56-L'],
  [287,  229, -1500, 337,  279, "X",    'key-col4-L'],
  [408,  189,     0, 458,  239, "C",    'key'],
  [508,  219,     0, 558,  269, "V",    'key'],
  [608,  233,     0, 658,  283, "B",    'key'],
  [685,  287,  2000,  735, 431, "ESC",  'key-esc'],
  [1045, 287, -2000, 1095, 431, "CAPS", 'key-esc'],
  [1122, 233,     0, 1172, 283, "N",     'key'],
  [1222, 219,     0, 1272, 269, "M",     'key'],
  [1322, 189,     0, 1372, 239, "COMMA", 'key'],
  [1443, 229,  1500, 1493, 279, "DOT",   'key-col4-R'],
  [1567, 362,     0, 1617, 412, "SLASH", 'key-pinky56'],
  [1672, 362,     0, 1722, 412, "SQT",   'key-pinky56'],
  [446,  339,     0,  496, 389, "GUI",  'key-thumb'],
  [568,  350,  1000,  618, 400, "ALT",  'key-thumb'],
  [685,  381,  2000,  735, 431, "SFT",  'key-thumb'],
  [796,  433,  3000,  846, 483, "NAV",  'key-thumb'],
  [934,  433, -3000,  984, 483, "SYM",  'key-thumb'],
  [1045, 381, -2000, 1095, 431, "SPC",  'key-thumb'],
  [1162, 350, -1000, 1212, 400, "ALT",  'key-thumb'],
  [1284, 339,     0, 1334, 389, "GUI",  'key-thumb'],
];

/** Rigid +19° for right cols 5+6: bbox x∈[1567,1772], y∈[176,462] */
const PINKY56_ROT_DEG = 19;
const PINKY56_CX = (1567 + 1772) / 2;
const PINKY56_CY = (176 + 462) / 2;

/** Rigid −19° for mirrored left outer pair (grave/Q…CTL/Z): bbox x∈[58,263] */
const PINKY56L_ROT_DEG = -19;
const PINKY56L_CX = (58 + 263) / 2;
const PINKY56L_CY = PINKY56_CY;

const svg = document.getElementById('kb');
let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
keys.forEach(([x, y]) => {
  minX = Math.min(minX, x); minY = Math.min(minY, y);
  maxX = Math.max(maxX, x + W); maxY = Math.max(maxY, y + H);
});

const PAD = 28;
const svgW = (maxX - minX) * SCALE + PAD * 2;
const svgH = (maxY - minY) * SCALE + PAD * 2;
svg.setAttribute('width', svgW);
svg.setAttribute('height', svgH);
svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);

const offX = -minX * SCALE + PAD;
const offY = -minY * SCALE + PAD;

function addKey(g, x, y, rot_cd, rx, ry, label, cls) {
  const px = x * SCALE + offX, py = y * SCALE + offY;
  const pw = W * SCALE - 2, ph = H * SCALE - 2;
  const prx = rx * SCALE + offX, pry = ry * SCALE + offY;
  const deg = rot_cd / 100;

  const inner = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  if (deg !== 0) inner.setAttribute('transform', `rotate(${deg}, ${prx}, ${pry})`);

  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', px); rect.setAttribute('y', py);
  rect.setAttribute('width', pw); rect.setAttribute('height', ph);
  rect.setAttribute('rx', 3); rect.setAttribute('class', cls);

  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', px + pw / 2); text.setAttribute('y', py + ph / 2);
  text.setAttribute('class', 'key-text'); text.textContent = label;

  inner.appendChild(rect);
  inner.appendChild(text);
  g.appendChild(inner);
}

/** Inverse SVG rotate(deg,pivot): local = pivot + Rᵀ(world−pivot). Layout units; y-down. */
function layoutUnrotate(wx, wy, deg, cx, cy) {
  const r = (deg * Math.PI) / 180;
  const c = Math.cos(r);
  const s = Math.sin(r);
  const ox = wx - cx;
  const oy = wy - cy;
  return [cx + c * ox + s * oy, cy - s * ox + c * oy];
}

/** Finger ring strip: rects axis-aligned, one group rotate ±15° (matches doc / Studio pivot line). */
function addCol4Strip(parent, rows, deg, pivotCx, pivotCy) {
  const prx = pivotCx * SCALE + offX;
  const pry = pivotCy * SCALE + offY;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('transform', `rotate(${deg}, ${prx}, ${pry})`);
  const pw = W * SCALE;
  const ph = H * SCALE;
  rows.forEach((row) => {
    const [, , , rx, ry, label] = row;
    const [lx, ly] = layoutUnrotate(rx, ry, deg, pivotCx, pivotCy);
    const cxL = lx * SCALE + offX;
    const cyL = ly * SCALE + offY;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', cxL - pw / 2);
    rect.setAttribute('y', cyL - ph / 2);
    rect.setAttribute('width', pw);
    rect.setAttribute('height', ph);
    rect.setAttribute('rx', 3);
    rect.setAttribute('class', 'key');
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', cxL);
    text.setAttribute('y', cyL);
    text.setAttribute('class', 'key-text');
    text.textContent = label;
    g.appendChild(rect);
    g.appendChild(text);
  });
  parent.appendChild(g);
}

const pinky56 = keys.filter((k) => k[6] === 'key-pinky56');
const pinky56L = keys.filter((k) => k[6] === 'key-pinky56-L');
const col4R = keys.filter((k) => k[6] === 'key-col4-R').sort((a, b) => a[1] - b[1]);
const col4L = keys.filter((k) => k[6] === 'key-col4-L').sort((a, b) => a[1] - b[1]);
const keyEscCaps = keys.filter((k) => k[6] === 'key-esc');
const rest = keys.filter((k) =>
  k[6] !== 'key-pinky56'
  && k[6] !== 'key-pinky56-L'
  && k[6] !== 'key-col4-R'
  && k[6] !== 'key-col4-L'
  && k[6] !== 'key-esc');

rest.forEach((row) => addKey(svg, ...row));

const g56L = document.createElementNS('http://www.w3.org/2000/svg', 'g');
const prxL = PINKY56L_CX * SCALE + offX;
const pryL = PINKY56L_CY * SCALE + offY;
g56L.setAttribute('transform', `rotate(${PINKY56L_ROT_DEG}, ${prxL}, ${pryL})`);
pinky56L.forEach(([x, y, rot_cd, rx, ry, label]) => addKey(g56L, x, y, rot_cd, rx, ry, label, 'key'));
svg.appendChild(g56L);

const g56 = document.createElementNS('http://www.w3.org/2000/svg', 'g');
const prxBlock = PINKY56_CX * SCALE + offX;
const pryBlock = PINKY56_CY * SCALE + offY;
g56.setAttribute('transform', `rotate(${PINKY56_ROT_DEG}, ${prxBlock}, ${pryBlock})`);
pinky56.forEach(([x, y, rot_cd, rx, ry, label, cls]) => addKey(g56, x, y, rot_cd, rx, ry, label, 'key'));
svg.appendChild(g56);

addCol4Strip(svg, col4L, -15, 303, 184);
addCol4Strip(svg, col4R, 15, 1527, 184);
keyEscCaps.forEach((row) => addKey(svg, ...row));
</script>
</body>
</html>
