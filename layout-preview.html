function renderKeyboard(svgId, keys) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  keys.forEach(([x, y]) => {
    minX = Math.min(minX, x); minY = Math.min(minY, y);
    maxX = Math.max(maxX, x + W); maxY = Math.max(maxY, y + H);
  });

  const PAD = 24;
  const svgW = (maxX - minX) * SCALE + PAD * 2;
  const svgH = (maxY - minY) * SCALE + PAD * 2;
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);

  const offX = -minX * SCALE + PAD;
  const offY = -minY * SCALE + PAD;

  function addKey(g, x, y, rot_cd, rx, ry, label, cls) {
    const px = x * SCALE + offX, py = y * SCALE + offY;
    const pw = W * SCALE - 2, ph = H * SCALE - 2;
    const prx = rx * SCALE + offX, pry = ry * SCALE + offY;
    const deg = rot_cd / 100;

    const inner = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    if (deg !== 0) inner.setAttribute('transform', `rotate(${deg}, ${prx}, ${pry})`);

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', px); rect.setAttribute('y', py);
    rect.setAttribute('width', pw); rect.setAttribute('height', ph);
    rect.setAttribute('rx', 3); rect.setAttribute('class', cls);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', px + pw / 2); text.setAttribute('y', py + ph / 2);
    text.setAttribute('class', 'key-text'); text.textContent = label;

    inner.appendChild(rect);
    inner.appendChild(text);
    g.appendChild(inner);
  }

  function layoutUnrotate(wx, wy, deg, cx, cy) {
    const r = (deg * Math.PI) / 180;
    const c = Math.cos(r);
    const s = Math.sin(r);
    const ox = wx - cx;
    const oy = wy - cy;
    return [cx + c * ox + s * oy, cy - s * ox + c * oy];
  }

  function addCol4Strip(parent, rows, deg, pivotCx, pivotCy) {
    const prx = pivotCx * SCALE + offX;
    const pry = pivotCy * SCALE + offY;
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `rotate(${deg}, ${prx}, ${pry})`);
    const pw = W * SCALE;
    const ph = H * SCALE;
    rows.forEach((row) => {
      const [, , , rx, ry, label] = row;
      const [lx, ly] = layoutUnrotate(rx, ry, deg, pivotCx, pivotCy);
      const cxL = lx * SCALE + offX;
      const cyL = ly * SCALE + offY;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', cxL - pw / 2);
      rect.setAttribute('y', cyL - ph / 2);
      rect.setAttribute('width', pw);
      rect.setAttribute('height', ph);
      rect.setAttribute('rx', 3);
      rect.setAttribute('class', 'key');
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', cxL);
      text.setAttribute('y', cyL);
      text.setAttribute('class', 'key-text');
      text.textContent = label;
      g.appendChild(rect);
      g.appendChild(text);
    });
    parent.appendChild(g);
  }

  const pinky56 = keys.filter((k) => k[6] === 'key-pinky56');
  const pinky56L = keys.filter((k) => k[6] === 'key-pinky56-L');
  const col4R = keys.filter((k) => k[6] === 'key-col4-R').sort((a, b) => a[1] - b[1]);
  const col4L = keys.filter((k) => k[6] === 'key-col4-L').sort((a, b) => a[1] - b[1]);
  const keyEscCaps = keys.filter((k) => k[6] === 'key-esc');
  const rest = keys.filter((k) =>
    k[6] !== 'key-pinky56'
    && k[6] !== 'key-pinky56-L'
    && k[6] !== 'key-col4-R'
    && k[6] !== 'key-col4-L'
    && k[6] !== 'key-esc');

  rest.forEach((row) => addKey(svg, ...row));

  const g56L = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const prxL = PINKY56L_CX * SCALE + offX;
  const pryL = PINKY56L_CY * SCALE + offY;
  g56L.setAttribute('transform', `rotate(${PINKY56L_ROT_DEG}, ${prxL}, ${pryL})`);
  pinky56L.forEach(([x, y, rot_cd, rx, ry, label]) => addKey(g56L, x, y, rot_cd, rx, ry, label, 'key'));
  svg.appendChild(g56L);

  const g56 = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const prxBlock = PINKY56_CX * SCALE + offX;
  const pryBlock = PINKY56_CY * SCALE + offY;
  g56.setAttribute('transform', `rotate(${PINKY56_ROT_DEG}, ${prxBlock}, ${pryBlock})`);
  pinky56.forEach(([x, y, rot_cd, rx, ry, label, cls]) => addKey(g56, x, y, rot_cd, rx, ry, label, 'key'));
  svg.appendChild(g56);

  addCol4Strip(svg, col4L, -15, 303, 184);
  addCol4Strip(svg, col4R, 15, 1527, 184);
  keyEscCaps.forEach((row) => addKey(svg, ...row));
}

function assertLen(layer, n) {
  if (layer.labels.length !== n) {
    console.error(layer.title, 'expected', n, 'labels, got', layer.labels.length);
  }
}

function buildSection(title, pathNote, layers) {
  const wrap = document.createElement('div');
  wrap.innerHTML = `<h3>${title}</h3><p class="section-note">${pathNote}</p>`;
  const grid = document.createElement('div');
  grid.className = 'layers-grid';

  layers.forEach((layer) => {
    assertLen(layer, 46);
    const card = document.createElement('div');
    card.className = 'layer-card';
    const h4 = document.createElement('h4');
    h4.textContent = layer.title;
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('id', layer.id);
    svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    card.appendChild(h4);
    card.appendChild(svg);
    grid.appendChild(card);
  });

  wrap.appendChild(grid);
  document.body.appendChild(wrap);

  layers.forEach((layer) => {
    renderKeyboard(layer.id, geometryLabels(layer.labels));
  });
}
