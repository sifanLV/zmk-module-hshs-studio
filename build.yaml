# This file generates the GitHub Actions matrix.
# Studio is enabled on the left (central) half only.
# Remove the snippet + cmake-args from hshs46_left if you do not want Studio.
---
include:
  - board: nice_nano_v2
    shield: hshs52_left nice_view_adapter nice_view
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano_v2
    shield: hshs52_right nice_view_adapter nice_view
  - board: nice_nano_v2
    shield: hshs46_left nice_view_adapter nice_view
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano_v2
    shield: hshs46_right nice_view_adapter nice_view
  - board: nice_nano_v2
    shield: settings_reset
